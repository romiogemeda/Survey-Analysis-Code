services:
  # ============================================================
  # PostgreSQL — Single database with schema-per-module
  # ============================================================
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: survey_analysis
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_schemas.sql:/docker-entrypoint-initdb.d/01_schemas.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================================
  # Redis — Dual purpose: Celery broker + application cache
  # ============================================================
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================================
  # FastAPI Application — The Modular Monolith
  # ============================================================
  api:
    build: .
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      DB_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/survey_analysis
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      APP_DEBUG: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ============================================================
  # Celery Worker — Async task processing
  # ============================================================
  worker:
    build: .
    command: celery -A workers.celery_app worker --loglevel=info -Q analytics,simulation
    volumes:
      - .:/app
    environment:
      DB_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/survey_analysis
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data: